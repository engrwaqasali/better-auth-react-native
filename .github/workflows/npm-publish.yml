name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --run

      - name: Check if version is already published
        id: version_check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null | grep -q .; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "Version ${PACKAGE_VERSION} already exists on npm — skipping publish."
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
            echo "Version ${PACKAGE_VERSION} is new — will publish."
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.already_published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}
